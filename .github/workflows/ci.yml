name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: |
          cd services/api
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run API tests with coverage
        run: |
          cd services/api
          . .venv/bin/activate
          python -m pytest --cov --cov-report=term-missing

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dev dependencies
        run: |
          cd services/api
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff lint
        run: |
          cd services/api
          . .venv/bin/activate
          python -m ruff check .
      - name: Ruff format check
        run: |
          cd services/api
          . .venv/bin/activate
          python -m ruff format --check .
      - name: Mypy type check
        run: |
          cd services/api
          . .venv/bin/activate
          python -m mypy

  secret-and-env-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if .env is tracked anywhere in history
        run: |
          if git log --all --diff-filter=A --name-only --pretty=format: | grep -E '(^|/)\.env$' | grep -v '\.env\.example'; then
            echo "::error::A .env file was committed to this repo. Purge with git filter-repo and rotate any exposed secrets."
            exit 1
          fi
      - name: Fail if .env is currently checked in
        run: |
          if git ls-files | grep -E '(^|/)\.env$' | grep -v '\.env\.example'; then
            echo "::error::.env is tracked in the working tree. Remove it and add to .gitignore."
            exit 1
          fi
      - name: Install detect-secrets
        run: python -m pip install detect-secrets==1.5.0
      - name: Scan for leaked secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '(^|/)\.git/|services/api/\.venv/|node_modules/' \
            > .detect-secrets-report.json
          python -c "import json,sys; r=json.load(open('.detect-secrets-report.json')); \
            findings=[(f,s) for f,items in r.get('results',{}).items() for s in items]; \
            sys.exit(1 if findings else 0)"

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify web and docs assets
        run: |
          test -f apps/web/index.html
          test -f apps/web/styles.css
          test -f apps/web/app.js
          test -f docs/ARCHITECTURE.md
          test -f docs/TRADING_GUARDRAILS.md
          test -f docs/SECURITY_RUNBOOK.md
          test -f docs/CONTRIBUTING.md
