name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-baseline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run backend baseline checks
      run: make api-baseline

  frontend-baseline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: apps/web-next/package-lock.json

    - name: Run frontend production build baseline
      env:
        NODE_ENV: production
        npm_config_omit: dev
      run: make web-next-build

  backend-frontend-evidence:
    needs:
      - backend-baseline
      - frontend-baseline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: apps/web-next/package-lock.json

    - name: Collect backend/frontend CI evidence
      run: make ci-evidence

    - name: Upload backend/frontend CI evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-frontend-ci-evidence
        path: ops/evidence/backend-frontend-ci-evidence.json
        if-no-files-found: error

  vm-deploy-evidence:
    needs:
      - backend-baseline
      - frontend-baseline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Collect VM deploy CI evidence
      run: make vm-deploy-ci-evidence

    - name: Upload VM deploy CI evidence
      uses: actions/upload-artifact@v4
      with:
        name: vm-deploy-ci-evidence
        path: ops/evidence/vm-deploy-ci-evidence.json
        if-no-files-found: error

  mirror-to-gitlab:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-baseline
      - frontend-baseline
      - backend-frontend-evidence
      - vm-deploy-evidence
    runs-on: ubuntu-latest
    env:
      GITLAB_BASE_URL: ${{ secrets.GITLAB_BASE_URL }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Mirror main to GitLab and wait for GitLab CI
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${GITLAB_BASE_URL:-}" ] || [ -z "${GITLAB_TOKEN:-}" ]; then
          echo "GITLAB_BASE_URL and GITLAB_TOKEN secrets are required for GitLab CI mirror."
          exit 1
        fi
        python3 <<'PY' >/tmp/gitlab_project.env
        import json
        import os
        import sys
        import urllib.error
        import urllib.parse
        import urllib.request

        token = os.environ["GITLAB_TOKEN"]
        raw_base = os.environ["GITLAB_BASE_URL"].strip().rstrip("/")
        if not raw_base.startswith(("http://", "https://")):
            raw_base = "https://" + raw_base
        parsed = urllib.parse.urlparse(raw_base)
        api_origin = f"{parsed.scheme}://{parsed.netloc}"
        repo_name = os.environ["GITHUB_REPOSITORY"].split("/", 1)[1]
        repo_path = repo_name.lower()

        def request(method, path, data=None):
            body = None
            headers = {"PRIVATE-TOKEN": token}
            if data is not None:
                body = urllib.parse.urlencode(data).encode()
                headers["Content-Type"] = "application/x-www-form-urlencoded"
            req = urllib.request.Request(
                f"{api_origin}/api/v4{path}",
                data=body,
                headers=headers,
                method=method,
            )
            with urllib.request.urlopen(req, timeout=30) as response:
                return json.loads(response.read().decode() or "{}")

        base_path = parsed.path.strip("/")
        if base_path and len(base_path.split("/")) >= 2:
            encoded = urllib.parse.quote(base_path, safe="")
            project = request("GET", f"/projects/{encoded}")
        else:
            query = urllib.parse.urlencode({"membership": "true", "search": repo_name, "simple": "true", "per_page": "100"})
            projects = request("GET", f"/projects?{query}")
            matches = [
                project for project in projects
                if project.get("path", "").lower() == repo_path
                or project.get("name", "").lower() == repo_path
                or project.get("path_with_namespace", "").lower().endswith("/" + repo_path)
            ]
            if matches:
                project = sorted(matches, key=lambda item: item.get("last_activity_at", ""), reverse=True)[0]
            else:
                try:
                    project = request("POST", "/projects", {"name": repo_name, "path": repo_name, "visibility": "private"})
                except urllib.error.HTTPError as exc:
                    sys.stderr.write(exc.read().decode(errors="replace"))
                    raise

        print(f"GITLAB_HTTP_URL={project['http_url_to_repo']}")
        print(f"GITLAB_PROJECT_ID={project['id']}")
        print(f"GITLAB_API_ORIGIN={api_origin}")
        PY
        source /tmp/gitlab_project.env
        export GITLAB_HTTP_URL GITLAB_PROJECT_ID GITLAB_API_ORIGIN
        project_url="${GITLAB_HTTP_URL#https://}"
        project_url="${project_url#http://}"
        git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${project_url}"
        git push gitlab "HEAD:refs/heads/main"
        python3 <<'PY'
        import json
        import os
        import time
        import urllib.parse
        import urllib.request

        token = os.environ["GITLAB_TOKEN"]
        api_origin = os.environ["GITLAB_API_ORIGIN"]
        project_id = os.environ["GITLAB_PROJECT_ID"]
        sha = os.environ["GITHUB_SHA"]

        def get(path):
            req = urllib.request.Request(
                f"{api_origin}/api/v4{path}",
                headers={"PRIVATE-TOKEN": token},
            )
            with urllib.request.urlopen(req, timeout=30) as response:
                return json.loads(response.read().decode() or "{}")

        encoded_project = urllib.parse.quote(str(project_id), safe="")
        max_attempts = int(os.environ.get("GITLAB_PIPELINE_WAIT_ATTEMPTS", "240"))
        terminal_ok = {"success"}
        terminal_bad = {"failed", "canceled"}
        for attempt in range(max_attempts):
            pipelines = get(f"/projects/{encoded_project}/pipelines?sha={sha}&per_page=1")
            if pipelines:
                pipeline = pipelines[0]
                status = pipeline.get("status")
                print(
                    f"GitLab pipeline {pipeline.get('id')} "
                    f"status={status} attempt={attempt + 1}/{max_attempts}"
                )
                if status in terminal_ok:
                    raise SystemExit(0)
                if status in terminal_bad:
                    raise SystemExit(f"GitLab pipeline failed with status={status}")
                if status == "skipped":
                    raise SystemExit("GitLab pipeline was skipped; release evidence is missing")
            else:
                print(f"Waiting for GitLab pipeline to appear attempt={attempt + 1}/{max_attempts}")
            time.sleep(10)
        raise SystemExit("Timed out waiting for GitLab pipeline")
        PY
