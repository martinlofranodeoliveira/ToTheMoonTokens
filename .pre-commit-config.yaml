# To install:
#   pip install pre-commit
#   pre-commit install
#
# To run against the whole repo once:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^services/api/
      - id: ruff-format
        files: ^services/api/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--exclude-files", "(^|/)\\.git/|services/api/\\.venv/|node_modules/"]
        exclude: ^(\.pre-commit-config\.yaml|\.secrets\.baseline)$

  - repo: local
    hooks:
      - id: no-env-file
        name: prevent committing .env
        entry: bash -c 'if git diff --cached --name-only | grep -E "(^|/)\.env$" | grep -v "\.env\.example"; then echo "Refusing to commit .env"; exit 1; fi'
        language: system
        pass_filenames: false
