services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: tothemoontokens-api:local
    container_name: tothemoontokens-api
    env_file:
      - .env
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8010
    ports:
      - "8010:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: python:3.12-slim
    container_name: tothemoontokens-web
    working_dir: /srv
    command: ["python", "-m", "http.server", "4173"]
    volumes:
      - ./apps/web:/srv:ro
    ports:
      - "4173:4173"
    depends_on:
      - api
    restart: unless-stopped
